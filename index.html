<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Tic-Tac-Toe</title>
  <link rel="stylesheet" href="src/styles.css" />
</head>
<body>
  <main class="app">
    <h1>Tic-Tac-Toe</h1>
    <p id="status" class="status" aria-live="polite">Player 1 (X) — your turn</p>
    <div id="board" class="board" role="grid" aria-label="Tic-tac-toe board"></div>
    <button id="reset" class="reset" type="button">New game</button>
  </main>
  <script type="module" src="src/ui.js"></script>
</body>
</html>
